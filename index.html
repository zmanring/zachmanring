    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Zach Manring",
      "jobTitle": "Design Systems Architect",
      "description": "Front-End Engineer, Podcast Host, and Maker with 25+ years building for the web.",
      "url": "https://zachmanring.me",
      "sameAs": [
        "https://linkedin.com/in/zachmanring",

        "https://youtube.com/@southernginger",
        "https://southerngingerworkshop.com"
      ]

    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0D0D0D;
      }
      #root {
        width: 100%;
        height: 100%;
        display: block;
      }
      /* Phaser canvas — no gaps */
      canvas {
        display: block;
        outline: none;
      }
      /* Skip navigation link — visible on keyboard focus only */
      .skip-link {
        position: absolute;
        left: -9999px;
        z-index: 10000;
        font-family: 'Press Start 2P', monospace;
        font-size: 11px;
      }
      .skip-link:focus {
        position: fixed;
        top: 8px;
        left: 8px;
        width: auto;
        height: auto;
        padding: 8px 16px;
        background: #DD4400;
        color: #F0EDE8;
        text-decoration: none;
        overflow: visible;
        outline: 2px solid #F0EDE8;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
